<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores Amarillas <3</title>

<link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital@1&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inclusive Sans', sans-serif;
    background:#000;
    color:white;
    text-align:center;
}

.Button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ffd700;
    cursor:pointer;
    font-size:16px;
}

.Contenedor-Binicio{
    margin-top:50px;
}

.Con-Emergente{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.cua{
    background:#222;
    padding:20px;
    border-radius:10px;
}

.Con-2{
    display:none;
    margin-top:20px;
}

canvas{
    margin-top:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="Contenedor-Binicio">
    <button class="Button" id="BVer">Click aquí</button>
</div>

<div class="Con-Emergente" id="modal">
    <div class="cua">
        <p>
            Holaaaaa niña preciosa perdón por olvidarme siempre de este día, te amooooo ❤️
        </p>    
        <button id="BotonCerrar" class="Button">Cerrar</button>
    </div>
</div>

<div class="Con-2" id="opciones">
    <h1>Elige una opción</h1>
    <button class="Button" id="B1">1 Flor</button>
    <button class="Button" id="B12">Muchas Flores 🌼</button>
</div>

<canvas id="Flor" width="800" height="500"></canvas>

<h2>Para la niña más linda del mundo 💛</h2>

<script>
const modal = document.getElementById("modal");
const opciones = document.getElementById("opciones");
const canvas = document.getElementById("Flor");
const ctx = canvas.getContext("2d");

document.getElementById("BVer").onclick = () => {
    modal.style.display = "flex";
};

document.getElementById("BotonCerrar").onclick = () => {
    modal.style.display = "none";
    opciones.style.display = "block";
};

// dibujar flor
function dibujarFlor(x, y, size){
    for(let i=0;i<8;i++){
        let angle = (i*Math.PI)/4;
        let px = x + Math.cos(angle)*size;
        let py = y + Math.sin(angle)*size;

        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(px, py, size/2, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.arc(x, y, size/2, 0, Math.PI*2);
    ctx.fill();
}

// muchas flores animadas 🌼
let flores = [];

function crearFlores(cantidad){
    flores = [];
    for(let i=0;i<cantidad;i++){
        flores.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            size: Math.random()*15+10,
            speed: Math.random()*1+0.5
        });
    }
}

function animar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    flores.forEach(f=>{
        dibujarFlor(f.x,f.y,f.size);
        f.y += f.speed;

        if(f.y > canvas.height){
            f.y = -10;
            f.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(animar);
}

// botones
document.getElementById("B1").onclick = () => {
    crearFlores(5);
};

document.getElementById("B12").onclick = () => {
    crearFlores(60); // MUCHAS flores 🔥
};

animar();
</script>

</body>
</html>
